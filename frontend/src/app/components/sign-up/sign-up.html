<div class="signup-container">
  <div class="signup-card">
    <h1 *ngIf="!isAdmin">Create Account</h1>
    <h1 *ngIf="isAdmin">Create Admin Account</h1>
    <p class="subtitle">Sign up for TaskManager to organize your tasks.</p>

    <form [formGroup]="signUpForm" (ngSubmit)="onSubmit()">
      
      <div class="form-group" *ngIf="!isAdmin">
        <label for="email">Email</label>
        <input 
          type="email" 
          id="email"
          name="email" 
          formControlName="email"
          placeholder="Enter your email"
        />
      </div>

      <div class="form-group">
        <label for="username">Username</label>
        <input 
          type="text" 
          id="username"
          name="username" 
          formControlName="username"
          placeholder="Choose a username"
        />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input 
          type="password" 
          id="password"
          name="password" 
          formControlName="password"
          placeholder="Create a password"
        />
      </div>

      <div class="form-group" *ngIf="isAdmin">
        <label for="company">Company</label>
        <input 
          type="text" 
          id="company"
          name="company" 
          formControlName="company"
          placeholder="Enter your company name"
        />
      </div>

      <button 
        class="signup-btn"
        type="submit" 
        [disabled]="signUpForm.invalid"
      >
        Register
      </button>

      <p class="message" *ngIf="message">
        {{ message }}
      </p>
    </form>

    <div class="login-section">
      <p>Already have an account?</p>
      <button class="login-btn" [routerLink]="isAdmin ? '/admin/login' : '/login'">
        Log in
      </button>
    </div>
  </div>
</div>
